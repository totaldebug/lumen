name: 🐛 Bug Report
description: Report a problem with the Lumen integration
labels: ["type/bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: input
    id: lumen-version
    attributes:
      label: Lumen version
    validations:
      required: true
  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
    validations:
      required: true
  - type: input
    id: hardware
    attributes:
      label: Inverter / dongle model
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Home Assistant logs for the `lumen` integration.
      render: shell
