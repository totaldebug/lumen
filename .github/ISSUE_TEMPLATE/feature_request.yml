name: 🚀 Feature Request
description: Suggest an idea for the Lumen integration
labels: ["type/feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
