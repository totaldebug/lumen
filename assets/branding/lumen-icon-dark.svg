<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Lumen icon">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb627" stop-opacity="0.9"/>
      <stop offset="35%" stop-color="#ffb627" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffb627" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5fe0d2"/>
      <stop offset="55%" stop-color="#4fd1c5"/>
      <stop offset="100%" stop-color="#2bb3a6"/>
    </linearGradient>
    <linearGradient id="core" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd06b"/>
      <stop offset="100%" stop-color="#e8920c"/>
    </linearGradient>
  </defs>

  <!-- panel background with rounded corners -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="#0e1419"/>
  <!-- subtle inner grid hairlines -->
  <g stroke="#1c2730" stroke-width="2">
    <line x1="0" y1="170" x2="512" y2="170"/>
    <line x1="0" y1="342" x2="512" y2="342"/>
    <line x1="170" y1="0" x2="170" y2="512"/>
    <line x1="342" y1="0" x2="342" y2="512"/>
  </g>

  <!-- aperture glow -->
  <circle cx="256" cy="256" r="170" fill="url(#glow)"/>

  <!-- aperture ring -->
  <circle cx="256" cy="256" r="132" fill="none" stroke="url(#ring)" stroke-width="26"/>

  <!-- six aperture blades as short ticks around the ring -->
  <g stroke="#0e1419" stroke-width="14" stroke-linecap="round">
    <line x1="256" y1="124" x2="256" y2="150"/>
    <line x1="370.3" y1="190" x2="347.8" y2="203"/>
    <line x1="370.3" y1="322" x2="347.8" y2="309"/>
    <line x1="256" y1="388" x2="256" y2="362"/>
    <line x1="141.7" y1="322" x2="164.2" y2="309"/>
    <line x1="141.7" y1="190" x2="164.2" y2="203"/>
  </g>

  <!-- luminous core -->
  <circle cx="256" cy="256" r="46" fill="url(#core)"/>
  <circle cx="256" cy="256" r="46" fill="none" stroke="#ffb627" stroke-width="2" opacity="0.6"/>
</svg>
