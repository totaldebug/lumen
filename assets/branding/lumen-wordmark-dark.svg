<svg width="900" height="260" viewBox="0 0 900 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Lumen — LuxPower Inverter for Home Assistant">
  <defs>
    <radialGradient id="wglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb627" stop-opacity="0.85"/>
      <stop offset="38%" stop-color="#ffb627" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffb627" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5fe0d2"/>
      <stop offset="55%" stop-color="#4fd1c5"/>
      <stop offset="100%" stop-color="#2bb3a6"/>
    </linearGradient>
    <linearGradient id="wcore" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd06b"/>
      <stop offset="100%" stop-color="#e8920c"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="900" height="260" rx="20" fill="#0e1419"/>

  <!-- aperture mark -->
  <g transform="translate(130,130)">
    <circle cx="0" cy="0" r="100" fill="url(#wglow)"/>
    <circle cx="0" cy="0" r="74" fill="none" stroke="url(#wring)" stroke-width="15"/>
    <g stroke="#0e1419" stroke-width="8" stroke-linecap="round">
      <line x1="0" y1="-74" x2="0" y2="-59"/>
      <line x1="64.1" y1="-37" x2="51.2" y2="-29.5"/>
      <line x1="64.1" y1="37" x2="51.2" y2="29.5"/>
      <line x1="0" y1="74" x2="0" y2="59"/>
      <line x1="-64.1" y1="37" x2="-51.2" y2="29.5"/>
      <line x1="-64.1" y1="-37" x2="-51.2" y2="-29.5"/>
    </g>
    <circle cx="0" cy="0" r="26" fill="url(#wcore)"/>
  </g>

  <!-- wordmark -->
  <text x="262" y="148" font-family="'Segoe UI Semibold','Helvetica Neue',Arial,sans-serif"
        font-size="104" font-weight="800" letter-spacing="2" fill="#e8eef2">LUMEN</text>
  <!-- accent underscore tying to amber -->
  <rect x="264" y="170" width="58" height="6" rx="3" fill="#ffb627"/>

  <!-- subtitle -->
  <text x="266" y="210" font-family="'SF Mono','JetBrains Mono',Consolas,monospace"
        font-size="22" letter-spacing="2" fill="#9fb0bd">LuxPower Inverter for Home Assistant</text>
</svg>
